<!<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller DOM - Gestor de actividades</title>
    <link rel="stylesheet" href="/DOM/CSS/css/style.css">
</head>
<body>

    <div class="contenedor">
        <h1>Gestor de Actividades Académicas</h1>
        <p class="descripcion">
            Agrega las Actividades pendientes, márcalas como realizadas o eliminalas
        </p>

        <div class="formulario">
            <input type="text" id="actividadInput" placeholder="Ejemplo: Entregar taller Javascript">
            <button id="btnAgregar">Agregar</button>
        </div>

        <p id="mensajeError" class="mensaje-error"></p>

        <div class = "resumen">
            <p>Total:  <span id="totalActividades"> 0 </span></p>
            <p>Realizadas: <span id="actividadesRealizadas"> 0 </span></p>
            <p>Pendientes: <span id="actividadesPendientes"> 0 </span></p>
        </div>
        <h2>Lista de Actividades</h2>
        <p id="mensajeVacio"class="Vacia">No hay actividades registradas.</p>
        <ul id="listaActividades"></ul>
    </div>
    <script src="/DOM/CSS/js/script.js"></script>
</body>
</html>
